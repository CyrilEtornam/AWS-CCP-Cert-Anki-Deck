<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>AWS CCP Study</title>
  <meta name="description" content="Offline flashcards and reference notes for the AWS Certified Cloud Practitioner exam.">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f0f0f0">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1a1a1a">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
  <script>
    (function () {
      var saved = localStorage.getItem('ccp-theme');
      var dark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.classList.toggle('dark', dark);
    })();
  </script>
</head>
<body>
  <header class="topbar">
    <div class="brand">AWS CCP Study</div>
    <div class="topbar-actions">
      <div class="conn-badge" id="conn-badge" hidden>Offline</div>
      <button class="icon-btn" id="btn-theme-toggle" aria-label="Toggle dark mode">&#9788;</button>
    </div>
  </header>

  <main id="view-root"></main>

  <nav class="tabbar" id="tabbar">
    <button class="tab-btn" data-tab="home" aria-current="page">
      <span class="tab-icon" aria-hidden="true">&#8962;</span>
      <span>Home</span>
    </button>
    <button class="tab-btn" data-tab="study">
      <span class="tab-icon" aria-hidden="true">&#9724;</span>
      <span>Study</span>
    </button>
    <button class="tab-btn" data-tab="reference">
      <span class="tab-icon" aria-hidden="true">&#128214;</span>
      <span>Reference</span>
    </button>
  </nav>

  <template id="tpl-home">
    <section class="view view-home">
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-value" data-stat="new">0</div>
          <div class="stat-label">New</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" data-stat="due">0</div>
          <div class="stat-label">Due</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" data-stat="mastered">0</div>
          <div class="stat-label">Mastered</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" data-stat="total">0</div>
          <div class="stat-label">Total</div>
        </div>
      </div>

      <div class="field">
        <label for="filter-deck">Deck</label>
        <select id="filter-deck"></select>
      </div>
      <div class="field">
        <label for="filter-tag">Exam / Tag</label>
        <select id="filter-tag"></select>
      </div>

      <button class="btn btn-primary btn-block" id="btn-start-study">Study due cards</button>
      <button class="btn btn-secondary btn-block" id="btn-cram">Cram this filter (ignore schedule)</button>
      <button class="btn btn-ghost btn-block" id="btn-reset-progress">Reset progress&hellip;</button>
    </section>
  </template>

  <template id="tpl-study">
    <section class="view view-study">
      <div class="study-header">
        <button class="btn btn-ghost btn-small" id="btn-study-exit">&larr; Home</button>
        <div class="study-progress" id="study-progress"></div>
      </div>

      <div class="card-area" id="card-area">
        <div class="empty-state" id="study-empty" hidden>
          <p>Nothing to study right now.</p>
          <button class="btn btn-primary" id="btn-study-empty-home">Back to Home</button>
        </div>
      </div>
    </section>
  </template>

  <template id="tpl-reference">
    <section class="view view-reference">
      <div class="reference-layout">
        <nav class="reference-list" id="reference-list" aria-label="Reference topics"></nav>
        <article class="reference-content" id="reference-content">
          <p class="empty-state">Pick a topic to read.</p>
        </article>
      </div>
    </section>
  </template>

  <script src="app.js"></script>
</body>
</html>
